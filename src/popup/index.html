<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOOCs Ultimate</title>
    <script type="module" src="./popup.js"></script>
    <style>
      body {
        width: 320px;
        margin: 0;
        color: #172033;
        background: #f1f5f9;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .um-popup-shell {
        padding: 18px;
      }

      .um-eyebrow {
        margin: 0 0 4px;
        color: #2563eb;
        font-size: 13px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0;
      }

      .um-status-card {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
        margin: 14px 0 16px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
      }

      .um-status-dot {
        width: 10px;
        height: 10px;
        margin-top: 5px;
        border-radius: 50%;
        background: #94a3b8;
        box-shadow: 0 0 0 4px #e2e8f0;
      }

      body[data-status="ready"] .um-status-dot {
        background: #22c55e;
        box-shadow: 0 0 0 4px #dcfce7;
      }

      body[data-status="warning"] .um-status-dot,
      body[data-status="error"] .um-status-dot {
        background: #f59e0b;
        box-shadow: 0 0 0 4px #fef3c7;
      }

      .um-status-copy {
        display: grid;
        gap: 2px;
        min-width: 0;
      }

      .um-status-copy strong {
        font-size: 13px;
      }

      .um-status-copy p {
        margin: 0;
        color: #64748b;
        font-size: 11px;
        line-height: 1.45;
      }

      .um-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .um-section-header h2 {
        margin: 0;
        font-size: 13px;
      }

      .um-section-header span {
        color: #64748b;
        font-size: 11px;
        font-weight: 700;
      }

      .um-feature-list {
        display: grid;
        gap: 5px;
        margin: 8px 0 16px;
        padding: 0;
        list-style: none;
      }

      .um-feature-list li {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        border: 1px solid #e2e8f0;
        align-items: center;
        border-radius: 7px;
        background: #ffffff;
        padding: 7px 10px;
        font-size: 12px;
      }

      .um-on {
        color: #15803d;
        font-weight: 800;
      }

      .um-off {
        color: #64748b;
        font-weight: 800;
      }

      button {
        width: 100%;
        min-height: 40px;
        border: 1px solid #2563eb;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="um-popup-shell">
      <p class="um-eyebrow">MOOCs Ultimate</p>
      <h1>拡張機能の状態</h1>
      <section class="um-status-card" aria-live="polite">
        <span class="um-status-dot" aria-hidden="true"></span>
        <div class="um-status-copy">
          <strong id="popup-status-title">確認中...</strong>
          <p id="popup-status">動作状態を確認しています。</p>
        </div>
      </section>
      <div class="um-section-header">
        <h2>主要機能</h2>
        <span id="feature-count">確認中</span>
      </div>
      <ul id="feature-list" class="um-feature-list"></ul>
      <button id="open-options" type="button">設定を開く</button>
    </main>
  </body>
</html>
